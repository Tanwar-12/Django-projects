<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Employee Record</title>
</head>
<body>
    <form method="post" action="/update/{{empl.eid}}">
        {% csrf_token %}
        Employee ID: <input type="text" name="eid" value="{{empl.eid}}" readonly><br><br>   
        Employee Name: <input type="text" name="ename" value="{{empl.ename}}"><br><br>
        Employee Email: <input type="email" name="email" value="{{empl.email}}"><br><br>
        Employee Phone: <input type="text" name="phone" value="{{empl.phone}}"><br><br>
        <button type="submit">Update</button>
    </form>
</body>
</html>
