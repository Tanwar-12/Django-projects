<!DOCTYPE html>
<html>
<head>
    <title>Edit Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-center text-warning mb-4">Edit Employee Record</h2>
        <form method="post" action="/update/{{empl.eid}}" class="shadow p-4 bg-white rounded">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Employee ID</label>
                <input type="text" name="eid" value="{{empl.eid}}" readonly class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Employee Name</label>
                <input type="text" name="ename" value="{{empl.ename}}" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Employee Email</label>
                <input type="email" name="email" value="{{empl.email}}" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Employee Phone</label>
                <input type="text" name="phone" value="{{empl.phone}}" class="form-control">
            </div>
            <div class="text-center">
                <button type="submit" class="btn btn-primary">Update</button>
            </div>
        </form>
    </div>
</body>
</html>
