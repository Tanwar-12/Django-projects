<!DOCTYPE html>
<html>
<head>
    <title>Show Employees</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-center text-info mb-4">All Employee Records</h2>
        <table class="table table-striped table-bordered shadow">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for employee in emp %}
                <tr>
                    <td>{{ employee.eid }}</td>
                    <td>{{ employee.ename }}</td>
                    <td>{{ employee.email }}</td>
                    <td>{{ employee.phone }}</td>
                    <td>
                        <a href="/edit/{{ employee.eid }}" class="btn btn-warning btn-sm">✏️ Edit</a>
                        <a href="/delete/{{ employee.eid }}" class="btn btn-danger btn-sm">🗑️ Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <div class="text-center mt-3">
            <a href="/emp" class="btn btn-success">➕ Add New Employee</a>
        </div>
    </div>
</body>
</html>
